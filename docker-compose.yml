services:
  postgres:
    image: postgres:18
    container_name: flexocable-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flexocable
      POSTGRES_USER: flexo_user
      POSTGRES_PASSWORD: flexo_dev_password
    ports:
      - "55432:5432"
    volumes:
      - flexocable-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexo_user -d flexocable"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  flexocable-postgres-data:
    name: flexocable-postgres-data
    external: true
