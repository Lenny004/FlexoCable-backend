services:
  postgres:
    image: postgres:17
    container_name: flexocable-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flexocable
      POSTGRES_USER: flexo_user
      POSTGRES_PASSWORD: flexo_dev_password
    ports:
      - "55432:5432"
    volumes:
      # Datos persistentes del contenedor
      - flexocable-postgres-v3-data:/var/lib/postgresql/data
      # Script de inicialización (solo se ejecuta si el volumen está vacío)
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexo_user -d flexocable"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  flexocable-postgres-v3-data:
    name: flexocable-postgres-v3-data
